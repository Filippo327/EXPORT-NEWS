<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Export News</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:30px; }
    h1 { color:#0b1f3a; }
    button { padding:10px 18px; background:#0b1f3a; color:white; border:0; cursor:pointer; }
    input { padding:10px; width:300px; margin-left:10px; }
    .news { background:white; padding:15px; margin:15px 0; border-radius:8px; }
    .news a { color:#0b1f3a; font-weight:bold; text-decoration:none; }
    .date { color:#666; font-size:13px; margin-top:5px; }
  </style>
</head>
<body>

<h1>Export News</h1>
<p>Notizie operative per export, mercati internazionali, logistica, dazi e geopolitica.</p>

<button onclick="loadNews()">Aggiorna ora</button>
<input type="text" id="search" placeholder="Cerca paese, settore, dazio..." onkeyup="filterNews()">

<p id="status">Stato: pronto</p>

<div id="news-container"></div>

<script>
const feeds = [
  "https://feeds.bbci.co.uk/news/business/rss.xml",
  "https://www.federalreserve.gov/feeds/press_all.xml",
  "https://www.ecb.europa.eu/press/rss/press.xml",
  "https://www.wto.org/english/news_e/news_e.xml"
];

let allNews = [];

async function loadNews() {
  document.getElementById("status").innerText = "Caricamento notizie...";
  document.getElementById("news-container").innerHTML = "";
  allNews = [];

  for (const feed of feeds) {
    const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(feed);

    try {
      const response = await fetch(proxyUrl);
      const text = await response.text();

      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "text/xml");
      const items = xml.querySelectorAll("item");

      items.forEach(item => {
        allNews.push({
          title: item.querySelector("title")?.textContent || "Senza titolo",
          link: item.querySelector("link")?.textContent || "#",
          date: item.querySelector("pubDate")?.textContent || "",
          description: item.querySelector("description")?.textContent || ""
        });
      });

    } catch (error) {
      console.error("Errore feed:", feed, error);
    }
  }

  renderNews(allNews);
  document.getElementById("status").innerText = "Ultimo aggiornamento: " + new Date().toLocaleString();
}

function renderNews(newsList) {
  const container = document.getElementById("news-container");
  container.innerHTML = "";

  if (newsList.length === 0) {
    container.innerHTML = "<p>Nessuna notizia trovata.</p>";
    return;
  }

  newsList.slice(0, 50).forEach(news => {
    const div = document.createElement("div");
    div.className = "news";
    div.innerHTML = `
      <a href="${news.link}" target="_blank">${news.title}</a>
      <div class="date">${news.date}</div>
      <p>${news.description}</p>
    `;
    container.appendChild(div);
  });
}

function filterNews() {
  const query = document.getElementById("search").value.toLowerCase();

  const filtered = allNews.filter(news =>
    news.title.toLowerCase().includes(query) ||
    news.description.toLowerCase().includes(query)
  );

  renderNews(filtered);
}
</script>

</body>
</html>
